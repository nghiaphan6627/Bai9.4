name: Kiểm thử đa hệ điều hành

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # Cấu hình Matrix Strategy theo yêu cầu image_99b062.png
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Chạy Unit Test với Maven
        # Lệnh này sẽ chạy file MatrixTest.java trên cả 3 hệ điều hành cùng lúc
        run: mvn test